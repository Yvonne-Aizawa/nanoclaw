name: Build and push containers

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set CalVer tag
        id: tag
        run: echo "VERSION=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Build MCP base
        run: |
          docker build --no-cache \
            -t nanoclaw-mcp-base \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw-mcp-base:${{ steps.tag.outputs.VERSION }} \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw-mcp-base:latest \
            container/mcp-base/

      - name: Build MCP child images
        run: |
          for name in mcp-brave mcp-caldav mcp-npx mcp-uvx mcp-remote; do
            docker build --no-cache \
              -t ${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw-${name}:${{ steps.tag.outputs.VERSION }} \
              -t ${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw-${name}:latest \
              container/${name}/
          done

      - name: Build agent image
        run: |
          docker build --no-cache \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw-agent:${{ steps.tag.outputs.VERSION }} \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw-agent:latest \
            container/

      - name: Push all images
        run: |
          for name in nanoclaw-mcp-base nanoclaw-mcp-brave nanoclaw-mcp-caldav nanoclaw-mcp-npx nanoclaw-mcp-uvx nanoclaw-mcp-remote nanoclaw-agent; do
            docker push ${{ env.REGISTRY }}/${{ env.OWNER }}/${name}:${{ steps.tag.outputs.VERSION }}
            docker push ${{ env.REGISTRY }}/${{ env.OWNER }}/${name}:latest
          done
