name: Build and push containers

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build metadata
        id: meta
        run: |
          echo "VERSION=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build MCP base
        run: |
          docker build --no-cache \
            -t nanoclaw-mcp-base \
            -t ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/nanoclaw-mcp-base:${{ steps.meta.outputs.VERSION }} \
            -t ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/nanoclaw-mcp-base:latest \
            container/mcp-base/

      - name: Build MCP child images
        run: |
          for name in mcp-npx mcp-uvx mcp-playwright; do
            docker build --no-cache \
              -t nanoclaw-${name} \
              -t ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/nanoclaw-${name}:${{ steps.meta.outputs.VERSION }} \
              -t ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/nanoclaw-${name}:latest \
              container/${name}/
          done

      - name: Build agent image
        run: |
          docker build --no-cache \
            -t ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/nanoclaw-agent:${{ steps.meta.outputs.VERSION }} \
            -t ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/nanoclaw-agent:latest \
            container/

      - name: Push all images
        run: |
          for name in nanoclaw-mcp-base nanoclaw-mcp-npx nanoclaw-mcp-uvx nanoclaw-mcp-playwright nanoclaw-agent; do
            docker push ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/${name}:${{ steps.meta.outputs.VERSION }}
            docker push ${{ env.REGISTRY }}/${{ steps.meta.outputs.OWNER }}/${name}:latest
          done
